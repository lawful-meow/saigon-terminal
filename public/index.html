<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Saigon Terminal VN30</title>
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title"><span>SAIGON</span> <span>TERMINAL</span></div>
        <div class="brand-copy">Bản đơn giản cho VN30. Mở app, xem mã nổi bật nhất, bấm mã khác để đổi, rồi đọc nhanh trước khi quyết định.</div>
      </div>
      <div class="toolbar">
        <span class="chip" id="statusChip">Đang khởi động</span>
        <button class="btn btn-primary" type="button" id="refreshBtn">Làm mới VN30</button>
        <button class="btn" type="button" id="advancedBtn">Advanced</button>
      </div>
    </header>

    <main class="home-shell">
      <section class="panel hero-panel" id="heroPanel"></section>

      <section class="home-grid">
        <section class="panel" id="listPanel"></section>
        <section class="panel" id="focusPanel"></section>
      </section>

      <section class="panel" id="detailPanel"></section>
    </main>
  </div>

  <div class="overlay" id="advancedOverlay">
    <div class="advanced-shell">
      <div class="advanced-head">
        <div>
          <div class="eyebrow">Advanced</div>
          <div class="panel-title">Khu vực nâng cao</div>
          <div class="panel-copy">Nghiên cứu, playbook, nhật ký, xuất bản và command được giữ ở đây để không làm rối flow chính.</div>
        </div>
        <button class="btn" type="button" id="closeAdvancedBtn">Đóng</button>
      </div>

      <div class="advanced-tabs" id="advancedTabs"></div>
      <div class="advanced-body" id="advancedBody"></div>
    </div>
  </div>

  <script type="module" src="/app/main.js"></script>
</body>
</html>
